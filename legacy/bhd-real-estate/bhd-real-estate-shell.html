<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BHD Real Estate — نظام إدارة العقارات / Property Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/api/admin/legacy-real-estate/css/main.css">
    <link rel="preload" href="/api/admin/legacy-real-estate/js/app-main.js" as="script">
    <link rel="preload" href="/api/admin/legacy-real-estate/modules/body-raw.html" as="fetch" crossorigin>
    <script>
    window.__bhdEnsureXlsxLoaded=function(cb){
      if(window.XLSX){if(cb)cb();return Promise.resolve();}
      if(window.__bhdXlsxLoading)return window.__bhdXlsxLoading;
      window.__bhdXlsxLoading=new Promise(function(res,rej){
        var s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
        s.async=true;
        s.onload=function(){if(cb)cb();res();};
        s.onerror=rej;
        document.head.appendChild(s);
      });
      return window.__bhdXlsxLoading;
    };
    window.__bhdApplyEntryModeFromUrl=function(){
      try{
        var p=new URLSearchParams(location.search);
        var m=p.get('mode');
        if(!m){
          try{m=sessionStorage.getItem('bhd_ui_last_mode')||localStorage.getItem('bhd_ui_last_mode');}catch(e){}
        }
        var cls={
          contracts:'mode-contracts',
          reservations:'mode-reservations',
          forms:'mode-forms',
          users:'mode-users',
          addressbook:'mode-addressbook',
          notifications:'mode-notifications',
          accounting:'mode-accounting',
          maintenance:'mode-maintenance',
          organization:'mode-organization',
          doc_templates:'mode-doc_templates',
          dashboard:'mode-dashboard'
        };
        if(m&&cls[m]){
          document.body.classList.add(cls[m]);
          if(p.get('viewer')!=='1')document.body.classList.add('entry-mode');
        }
        if(p.get('embed')==='calendar'){
          document.body.classList.add('bhd-embed-calendar');
          if(!document.getElementById('bhd-embed-calendar-css')){
            var st=document.createElement('style');
            st.id='bhd-embed-calendar-css';
            st.textContent='#appTopNav,.dashboard-header,.dash-hero,.dash-main-col,.dash-units-section{display:none!important}'
              +'.bhd-embed-calendar .dashboard{padding:8px!important}'
              +'.bhd-embed-calendar .dash-body-grid{display:block!important}'
              +'.bhd-embed-calendar .dash-side-col{width:100%!important;max-width:100%!important}';
            document.head.appendChild(st);
          }
        }
      }catch(e){}
    };
    /** عرض فوري من الكاش قبل تحميل app-main.js (~3.4MB) — يقلّل انتظار ظهور البيانات */
    window.__bhdEarlyDashboardPaint=function(){
      try{
        var mode='';
        try{mode=new URLSearchParams(location.search).get('mode')||'';}catch(e0){}
        if(mode&&mode!=='dashboard')return false;
        function parseArr(key){
          try{
            var raw=localStorage.getItem(key);
            if(!raw)return [];
            var o=JSON.parse(raw);
            return Array.isArray(o)?o:[];
          }catch(e){return [];}
        }
        function esc(s){
          return String(s==null?'':s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
        }
        function set(id,v){
          var el=document.getElementById(id);
          if(el)el.textContent=String(v);
        }
        var units=parseArr('bhd_managed_units');
        var buildings=parseArr('bhd_buildings_list');
        var owners=parseArr('bhd_owners_list');
        if(!units.length&&!buildings.length)return false;
        var rented=0,vacant=0,reserved=0;
        for(var i=0;i<units.length;i++){
          var u=units[i]||{};
          var st=String(u.status||'');
          if(st==='Rented')rented++;
          else if(st==='Reserved'||u.reserved)reserved++;
          else vacant++;
        }
        set('statBuildings',buildings.length||new Set(units.map(function(x){return String((x&&x.building)||'').trim();}).filter(Boolean)).size);
        set('statOwnersCount',owners.length);
        set('statTotalUnits',units.length);
        set('statRentedUnits',rented);
        set('statVacantUnits',vacant);
        set('statReservedUnits',reserved);
        var tbody=document.getElementById('unitsTableBody');
        if(tbody&&units.length){
          var page=units.slice(0,100);
          var html='';
          for(var j=0;j<page.length;j++){
            var row=page[j]||{};
            html+='<tr>'
              +'<td>'+esc(row.building)+'</td>'
              +'<td>'+esc(row.ownerNames||'—')+'</td>'
              +'<td>'+esc(row.unit)+'</td>'
              +'<td>'+esc(row.tenant||'-')+'</td>'
              +'<td>'+esc(row.status||'')+'</td>'
              +'<td>—</td>'
              +'<td>'+esc(row.endDate||'-')+'</td>'
              +'<td>—</td>'
              +'<td>'+esc(row.electricity||'-')+'</td>'
              +'<td>'+esc(row.water||'-')+'</td>'
              +'<td></td>'
              +'</tr>';
          }
          tbody.innerHTML=html;
        }
        window.__bhdEarlyDashboardPaintDone=true;
        return true;
      }catch(e){
        console.warn('[BHD shell] early dashboard paint',e);
        return false;
      }
    };
    </script>
    <script id="bhd-early-page-shell">
    (function(){
        try{
            var nav=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0];
            if(nav&&nav.type==='reload'){
                try{sessionStorage.setItem('bhd_app_refresh_fast','1');}catch(e){}
            }
        }catch(e){}
    })();
    </script>
    <style>
    #bhd-shell-loading{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:hsla(0,0%,96%,.92);font-family:system-ui,sans-serif}
    #bhd-shell-loading.bhd-hidden{display:none}
    .bhd-shell-spinner{width:42px;height:42px;border:3px solid #e5e7eb;border-top-color:#8B0000;border-radius:50%;animation:bhd-spin .8s linear infinite}
    @keyframes bhd-spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div id="bhd-shell-loading" aria-live="polite">
        <div style="text-align:center">
            <div class="bhd-shell-spinner" aria-hidden="true"></div>
            <p id="bhd-shell-loading-msg" style="margin:12px 0 0;font-weight:600;color:#313131" data-ar="جاري تحميل نظام العقارات…" data-en="Loading real estate system…">جاري تحميل نظام العقارات…</p>
        </div>
    </div>
    <div id="module-body"></div>
    <script>
    (function(){
        var BASE='/api/admin/legacy-real-estate/';
        var bodyUrl=BASE+'modules/body-raw.html';
        var mainJsUrl=BASE+'js/app-main.js';
        var loaderHidden=false;

        function setLoaderMsg(ar,en){
            var el=document.getElementById('bhd-shell-loading-msg');
            if(!el)return;
            el.setAttribute('data-ar',ar);
            el.setAttribute('data-en',en);
            el.textContent=ar;
        }

        function hideLoader(){
            if(loaderHidden)return;
            loaderHidden=true;
            var el=document.getElementById('bhd-shell-loading');
            if(el)el.classList.add('bhd-hidden');
        }
        window.__bhdHideShellLoader=hideLoader;

        function loadScript(src){
            return new Promise(function(resolve,reject){
                var s=document.createElement('script');
                s.src=src;
                s.async=false;
                s.onload=function(){resolve();};
                s.onerror=function(){reject(new Error('script failed: '+src));};
                document.body.appendChild(s);
            });
        }

        var bodyPromise=fetch(bodyUrl,{credentials:'include',cache:'default'}).then(function(r){
            if(!r.ok)throw new Error('HTTP '+r.status);
            return r.text();
        });

        bodyPromise
            .then(function(html){
                var c=document.getElementById('module-body');
                if(c)c.innerHTML=html;
                if(typeof window.__bhdApplyEntryModeFromUrl==='function')window.__bhdApplyEntryModeFromUrl();

                function afterPaintAttempt(painted){
                    if(painted){
                        hideLoader();
                    }else{
                        setLoaderMsg('جاري جلب البيانات…','Loading data…');
                    }
                    return loadScript(mainJsUrl).then(function(){
                        setTimeout(hideLoader,50);
                    });
                }

                function attemptPaint(){
                    var painted=false;
                    try{
                        painted=!!(window.__bhdEarlyDashboardPaint&&window.__bhdEarlyDashboardPaint());
                    }catch(ePaint){}
                    return afterPaintAttempt(painted);
                }

                /** إن كان الجسر يسحب Neon، انتظر قليلاً قبل الرسم المبكر */
                if(window.__bhdBridgeDashboardKvHydrating&&!window.__bhdEarlyDashboardPaintDone){
                    return new Promise(function(resolve){
                        var done=false;
                        function finish(){
                            if(done)return;
                            done=true;
                            try{window.removeEventListener('bhd-kv-hydrated',onHyd);}catch(e){}
                            resolve(attemptPaint());
                        }
                        function onHyd(){finish();}
                        try{window.addEventListener('bhd-kv-hydrated',onHyd);}catch(e2){}
                        setTimeout(finish,2800);
                    }).then(function(p){return p;});
                }
                return attemptPaint();
            })
            .catch(function(err){
                console.error('[BHD shell] boot failed',err);
                hideLoader();
            });
    })();
    </script>
</body>
</html>
