<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BHD Real Estate — نظام إدارة العقارات / Property Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/api/admin/legacy-real-estate/css/main.css">
    <link rel="preload" href="/api/admin/legacy-real-estate/js/app-main.js" as="script">
    <link rel="preload" href="/api/admin/legacy-real-estate/modules/body-raw.html" as="fetch" crossorigin>
    <script>
    window.__bhdEnsureXlsxLoaded=function(cb){
      if(window.XLSX){if(cb)cb();return Promise.resolve();}
      if(window.__bhdXlsxLoading)return window.__bhdXlsxLoading;
      window.__bhdXlsxLoading=new Promise(function(res,rej){
        var s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
        s.async=true;
        s.onload=function(){if(cb)cb();res();};
        s.onerror=rej;
        document.head.appendChild(s);
      });
      return window.__bhdXlsxLoading;
    };
    window.__bhdApplyEntryModeFromUrl=function(){
      try{
        var p=new URLSearchParams(location.search);
        var m=p.get('mode');
        if(!m){
          try{m=sessionStorage.getItem('bhd_ui_last_mode')||localStorage.getItem('bhd_ui_last_mode');}catch(e){}
        }
        var cls={
          contracts:'mode-contracts',
          reservations:'mode-reservations',
          forms:'mode-forms',
          users:'mode-users',
          addressbook:'mode-addressbook',
          notifications:'mode-notifications',
          accounting:'mode-accounting',
          maintenance:'mode-maintenance',
          organization:'mode-organization',
          doc_templates:'mode-doc_templates',
          dashboard:'mode-dashboard'
        };
        if(m&&cls[m]){
          document.body.classList.add(cls[m]);
          if(p.get('viewer')!=='1')document.body.classList.add('entry-mode');
        }
        if(p.get('embed')==='calendar'){
          document.body.classList.add('bhd-embed-calendar');
          if(!document.getElementById('bhd-embed-calendar-css')){
            var st=document.createElement('style');
            st.id='bhd-embed-calendar-css';
            st.textContent='#appTopNav,.dashboard-header,.dash-hero,.dash-main-col,.dash-units-section{display:none!important}'
              +'.bhd-embed-calendar .dashboard{padding:8px!important}'
              +'.bhd-embed-calendar .dash-body-grid{display:block!important}'
              +'.bhd-embed-calendar .dash-side-col{width:100%!important;max-width:100%!important}';
            document.head.appendChild(st);
          }
        }
      }catch(e){}
    };
    /**
     * معطّل عمداً — الرسم المبكر من الشِل كان يظهر أصفاراً/إنجليزي ثم تُستبدل البيانات.
     * الكشف يتم فقط من app-main عبر paintDashboardFirstReveal.
     */
    window.__bhdEarlyDashboardPaint=function(){return false;};
    /** انتظار جاهزية مفاتيح اللوحة من جسر Neon (بما فيها المحاسبة/المهام للكشف الواحد) */
    window.__bhdWaitDashboardKvReady=function(timeoutMs){
      var limit=timeoutMs==null?4500:timeoutMs;
      return new Promise(function(resolve){
        if(window.__bhdBridgeStagedKvHydratedOk||window.__bhdBridgeStagedKvHydrated){
          resolve(!!window.__bhdBridgeStagedKvHydratedOk);
          return;
        }
        var done=false;
        function finish(ok){
          if(done)return;
          done=true;
          try{window.removeEventListener('bhd-kv-hydrated',onHyd);}catch(e){}
          resolve(!!ok);
        }
        function onHyd(){finish(true);}
        try{window.addEventListener('bhd-kv-hydrated',onHyd);}catch(e2){}
        var t0=Date.now();
        (function tick(){
          if(done)return;
          if(window.__bhdBridgeStagedKvHydratedOk||window.__bhdBridgeStagedKvHydrated){
            finish(!!window.__bhdBridgeStagedKvHydratedOk);
            return;
          }
          if(Date.now()-t0>=limit){finish(false);return;}
          setTimeout(tick,40);
        })();
      });
    };
    </script>
    <script id="bhd-early-page-shell">
    (function(){
        try{
            var nav=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0];
            if(nav&&nav.type==='reload'){
                try{sessionStorage.setItem('bhd_app_refresh_fast','1');}catch(e){}
            }
        }catch(e){}
        try{document.documentElement.classList.add('bhd-dash-booting');}catch(e2){}
    })();
    </script>
    <style>
    html.bhd-dash-booting #module-body{visibility:hidden!important;pointer-events:none!important}
    #bhd-shell-loading{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 28%,#fff 0%,#f6f1ec 55%,#ebe4dc 100%);font-family:"Segoe UI",Tahoma,Arial,sans-serif;transition:opacity .32s ease}
    #bhd-shell-loading.bhd-hidden{display:none;opacity:0}
    .bhd-shell-brand{width:min(360px,92vw);text-align:center}
    .bhd-shell-logo{width:min(180px,48vw);height:auto;display:block;margin:0 auto 18px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.1))}
    .bhd-shell-heart-wrap{position:relative;width:min(280px,78vw);margin:0 auto 8px;aspect-ratio:1.1 / 1}
    .bhd-shell-heart-svg{width:100%;height:100%;display:block;overflow:visible}
    .bhd-shell-heart-track{fill:none;stroke:#e6ddd4;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .bhd-shell-heart-fill{fill:none;stroke:#8B0000;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;transition:stroke-dashoffset .45s cubic-bezier(.22,.7,.25,1);filter:drop-shadow(0 0 8px rgba(139,0,0,.28))}
    .bhd-shell-heart-pusher{position:absolute;width:52px;height:48px;margin-left:-26px;margin-top:-24px;left:50%;top:22%;z-index:3;transition:left .45s cubic-bezier(.22,.7,.25,1),top .45s cubic-bezier(.22,.7,.25,1);pointer-events:none;filter:drop-shadow(0 6px 14px rgba(0,0,0,.18))}
    .bhd-shell-heart-pusher svg{width:52px;height:48px;display:block}
    .bhd-shell-heart-pusher image,.bhd-shell-heart-pusher img{width:28px;height:28px;object-fit:contain}
    .bhd-shell-pct{margin:10px 0 6px;font-size:22px;font-weight:700;color:#3a2f2a;font-variant-numeric:tabular-nums;letter-spacing:.03em}
    .bhd-shell-hint{margin:0;font-size:14px;color:#6b5e55;font-weight:500}
    </style>
</head>
<body>
    <div id="bhd-shell-loading" aria-live="polite" role="status" aria-label="جاري التحميل">
        <div class="bhd-shell-brand">
            <img class="bhd-shell-logo" src="/logo-bhd.png" alt="بن حمود للتطوير — BHD" width="180" height="180" decoding="async">
            <div class="bhd-shell-heart-wrap" aria-hidden="true">
                <svg class="bhd-shell-heart-svg" viewBox="0 0 100 92" preserveAspectRatio="xMidYMid meet">
                    <!-- مسار القلب: يبدأ من النقرة العلوية ويدور مع عقارب الساعة -->
                    <path id="bhd-shell-heart-path" class="bhd-shell-heart-track" d="M50 22 C46 10 34 4 24 8 C10 14 6 30 12 44 C20 62 42 76 50 86 C58 76 80 62 88 44 C94 30 90 14 76 8 C66 4 54 10 50 22 Z"/>
                    <path id="bhd-shell-heart-fill" class="bhd-shell-heart-fill" d="M50 22 C46 10 34 4 24 8 C10 14 6 30 12 44 C20 62 42 76 50 86 C58 76 80 62 88 44 C94 30 90 14 76 8 C66 4 54 10 50 22 Z" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>
                </svg>
                <div id="bhd-shell-pusher" class="bhd-shell-heart-pusher">
                    <svg viewBox="0 0 52 48" aria-hidden="true">
                        <defs>
                            <clipPath id="bhdHeartLogoClip">
                                <path d="M26 10 C24 4 17 1 12 3 C4 6 2 15 5 23 C10 33 22 40 26 45 C30 40 42 33 47 23 C50 15 48 6 40 3 C35 1 28 4 26 10 Z"/>
                            </clipPath>
                        </defs>
                        <path d="M26 10 C24 4 17 1 12 3 C4 6 2 15 5 23 C10 33 22 40 26 45 C30 40 42 33 47 23 C50 15 48 6 40 3 C35 1 28 4 26 10 Z" fill="#fff" stroke="#8B0000" stroke-width="2.2"/>
                        <g clip-path="url(#bhdHeartLogoClip)">
                            <image href="/logo-bhd.png" xlink:href="/logo-bhd.png" x="12" y="10" width="28" height="28" preserveAspectRatio="xMidYMid meet"></image>
                        </g>
                    </svg>
                </div>
            </div>
            <div id="bhd-shell-pct" class="bhd-shell-pct">0%</div>
            <p id="bhd-shell-hint" class="bhd-shell-hint">جاري التحميل</p>
        </div>
    </div>
    <div id="module-body"></div>
    <script>
    (function(){
        var BOOT_REV='2026-07-19-heart-loader-v12';
        var BASE='/api/admin/legacy-real-estate/';
        var bodyUrl=BASE+'modules/body-raw.html?v='+encodeURIComponent(BOOT_REV);
        var mainJsUrl=BASE+'js/app-main.js?v='+encodeURIComponent(BOOT_REV);
        var loaderHidden=false;
        var progressPct=0;
        var heartPathLen=0;

        function measureHeartPath(){
            try{
                var p=document.getElementById('bhd-shell-heart-path');
                if(p&&typeof p.getTotalLength==='function'){
                    heartPathLen=p.getTotalLength();
                }
            }catch(e){heartPathLen=0;}
        }

        function setLoaderProgress(pct){
            var n=Math.max(0,Math.min(100,Math.round(Number(pct)||0)));
            if(n<progressPct&&n<100)n=progressPct;
            progressPct=n;
            var fill=document.getElementById('bhd-shell-heart-fill');
            var pusher=document.getElementById('bhd-shell-pusher');
            var path=document.getElementById('bhd-shell-heart-path');
            var pctEl=document.getElementById('bhd-shell-pct');
            var wrap=document.querySelector('.bhd-shell-heart-wrap');
            if(fill){
                /** pathLength=100 → dashoffset من 100 إلى 0 */
                fill.style.strokeDashoffset=String(100-n);
            }
            if(pusher&&path&&wrap&&typeof path.getPointAtLength==='function'){
                if(!heartPathLen)measureHeartPath();
                var len=heartPathLen||path.getTotalLength();
                var pt=path.getPointAtLength(len*(n/100));
                var box=path.ownerSVGElement.getBoundingClientRect();
                var vb=path.ownerSVGElement.viewBox.baseVal;
                var sx=box.width/(vb.width||100);
                var sy=box.height/(vb.height||92);
                var wrapBox=wrap.getBoundingClientRect();
                var svgBox=path.ownerSVGElement.getBoundingClientRect();
                pusher.style.left=((svgBox.left-wrapBox.left)+(pt.x*sx))+'px';
                pusher.style.top=((svgBox.top-wrapBox.top)+(pt.y*sy))+'px';
            }
            if(pctEl)pctEl.textContent=n+'%';
        }
        window.__bhdSetShellLoaderProgress=function(pct){setLoaderProgress(pct);};

        function hideLoader(){
            if(loaderHidden)return;
            loaderHidden=true;
            setLoaderProgress(100);
            try{document.documentElement.classList.remove('bhd-dash-booting');}catch(e0){}
            var el=document.getElementById('bhd-shell-loading');
            if(el){
                el.style.opacity='0';
                setTimeout(function(){el.classList.add('bhd-hidden');},320);
            }
        }
        window.__bhdHideShellLoader=hideLoader;

        function loadScript(src){
            return new Promise(function(resolve,reject){
                var s=document.createElement('script');
                s.src=src;
                s.async=false;
                s.onload=function(){resolve();};
                s.onerror=function(){reject(new Error('script failed: '+src));};
                document.body.appendChild(s);
            });
        }

        function isDashboardMode(){
            try{
                var m=new URLSearchParams(location.search).get('mode');
                return !m||m==='dashboard';
            }catch(e){return true;}
        }

        measureHeartPath();
        setLoaderProgress(8);
        try{window.addEventListener('resize',function(){measureHeartPath();setLoaderProgress(progressPct);});}catch(eR){}

        var bodyPromise=fetch(bodyUrl,{credentials:'include',cache:'default'}).then(function(r){
            if(!r.ok)throw new Error('HTTP '+r.status);
            return r.text();
        });

        bodyPromise
            .then(function(html){
                var c=document.getElementById('module-body');
                if(c)c.innerHTML=html;
                if(typeof window.__bhdApplyEntryModeFromUrl==='function')window.__bhdApplyEntryModeFromUrl();

                function revealThenLoadMain(){
                    setLoaderProgress(52);
                    return loadScript(mainJsUrl).then(function(){
                        setLoaderProgress(72);
                        setTimeout(function(){
                            if(!window.__bhdDashboardAppPaintDone){
                                hideLoader();
                            }
                        },12000);
                    });
                }

                if(!isDashboardMode()){
                    try{document.documentElement.classList.remove('bhd-dash-booting');}catch(eNb){}
                    setLoaderProgress(40);
                    return loadScript(mainJsUrl).then(function(){setTimeout(hideLoader,50);});
                }

                setLoaderProgress(24);
                var wait=window.__bhdWaitDashboardKvReady
                    ? window.__bhdWaitDashboardKvReady(4500)
                    : Promise.resolve(false);
                return wait.then(function(){
                    setLoaderProgress(44);
                    return revealThenLoadMain();
                });
            })
            .catch(function(err){
                console.error('[BHD shell] boot failed',err);
                hideLoader();
            });
    })();
    </script>
</body>
</html>
