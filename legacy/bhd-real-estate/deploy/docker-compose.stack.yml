# تطوير — PostgreSQL + API في حاوية واحدة (بدون Caddy)
# docker compose -f deploy/docker-compose.stack.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bhd
      POSTGRES_PASSWORD: bhd_dev_secret
      POSTGRES_DB: bhd_cloud
    volumes:
      - bhd_pg_stack:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bhd -d bhd_cloud']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - '3790:3790'
    environment:
      HOST: 0.0.0.0
      PORT: 3790
      NODE_ENV: production
      DATABASE_URL: postgresql://bhd:bhd_dev_secret@postgres:5432/bhd_cloud
      JWT_ACCESS_SECRET: dev-only-change-me-access-secret-32chars
      JWT_REFRESH_SECRET: dev-only-change-me-refresh-secret-32chars
      CORS_ORIGINS: http://localhost:3789,http://127.0.0.1:3789,http://localhost:3790,http://127.0.0.1:3790
      FILE_STORAGE_DIR: /app/data/files
    volumes:
      - bhd_api_files_stack:/app/data/files
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bhd_pg_stack:
  bhd_api_files_stack:
