# إنتاج — PostgreSQL + API + واجهة + HTTPS (Caddy)
# الاستخدام:
#   copy deploy\.env.prod.example deploy\.env.prod
#   عدّل DOMAIN وكلمات المرور
#   docker compose -f deploy\docker-compose.prod.yml --env-file deploy\.env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bhd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bhd_cloud}
    volumes:
      - bhd_pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bhd} -d ${POSTGRES_DB:-bhd_cloud}']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3790
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bhd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bhd_cloud}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${DOMAIN}}
      FILE_STORAGE_DIR: /app/data/files
      SAAS_REGISTRATION_SECRET: ${SAAS_REGISTRATION_SECRET:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - bhd_api_files:/app/data/files
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3790'
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3789
      NODE_ENV: production
      DATABASE_PATH: /app/data/rental.db
      CLOUD_API_URL: http://api:3790
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-0}
    volumes:
      - bhd_web_sqlite:/app/data
    depends_on:
      - api
    expose:
      - '3789'
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  bhd_pg_prod:
  bhd_api_files:
  bhd_web_sqlite:
  caddy_data:
  caddy_config:
