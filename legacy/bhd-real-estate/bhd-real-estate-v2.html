<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BHD Real Estate v2 — نظام إدارة العقارات (مجزأ)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="/api/admin/legacy-real-estate/css/main.css">
    <script id="bhd-early-page-shell">
    (function(){
        try{
            var nav=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0];
            if(nav&&nav.type==='reload'){
                try{sessionStorage.setItem('bhd_app_refresh_fast','1');}catch(e){}
            }
            var p=new URLSearchParams(location.search);
            var m=p.get('mode');
            if(!m){
                try{m=sessionStorage.getItem('bhd_ui_last_mode')||localStorage.getItem('bhd_ui_last_mode');}catch(e){}
            }
            var cls={
                contracts:'mode-contracts',
                reservations:'mode-reservations',
                forms:'mode-forms',
                users:'mode-users',
                addressbook:'mode-addressbook',
                notifications:'mode-notifications',
                accounting:'mode-accounting',
                maintenance:'mode-maintenance',
                organization:'mode-organization',
                doc_templates:'mode-doc_templates',
                dashboard:'mode-dashboard'
            };
            if(m&&cls[m]){
                document.body.classList.add(cls[m]);
                if(p.get('viewer')!=='1')document.body.classList.add('entry-mode');
            }
        }catch(e){}
    })();
    </script>
</head>
<body>
    <div id="module-body"></div>

    <script>
    (function() {
        const bodyUrl = '/api/admin/legacy-real-estate/modules/body-raw.html';
        const mainJsUrl = '/api/admin/legacy-real-estate/js/app-main.js';

        fetch(bodyUrl, { credentials: 'include', cache: 'no-store' })
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.text();
            })
            .then(function(html) {
                const container = document.getElementById('module-body');
                if (container) container.innerHTML = html;
                const script = document.createElement('script');
                script.src = mainJsUrl;
                script.async = false;
                document.body.appendChild(script);
            })
            .catch(function(error) {
                console.error('[BHD v2] body load failed', error);
                const script = document.createElement('script');
                script.src = mainJsUrl;
                document.body.appendChild(script);
            });
    })();
    </script>
</body>
</html>
