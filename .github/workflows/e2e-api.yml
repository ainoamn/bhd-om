name: E2E API guards

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run API guard tests
        run: npm run test:e2e:api
        env:
          CI: true
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  e2e-critical:
    runs-on: ubuntu-latest
    env:
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    if: env.E2E_ADMIN_EMAIL != '' && env.E2E_ADMIN_PASSWORD != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run critical flow tests
        run: npm run test:e2e:critical
        env:
          CI: true
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_SECURITY_PIN: ${{ secrets.E2E_SECURITY_PIN }}
          E2E_ACCOUNTANT_EMAIL: ${{ secrets.E2E_ACCOUNTANT_EMAIL }}
          E2E_ACCOUNTANT_PASSWORD: ${{ secrets.E2E_ACCOUNTANT_PASSWORD }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
