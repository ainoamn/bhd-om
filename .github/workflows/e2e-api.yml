name: E2E API guards

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bhd_om
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bhd_om
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000
      E2E_ADMIN_EMAIL: admin@bhd-om.com
      E2E_ADMIN_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database for authenticated API tests
        run: npx prisma db seed

      - name: Build application
        run: npm run build

      - name: Run API guard tests
        run: npm run test:e2e:api
        env:
          CI: true
          E2E_ADMIN_EMAIL: admin@bhd-om.com
          E2E_ADMIN_PASSWORD: admin123

  e2e-critical:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bhd_om
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bhd_om
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000
      E2E_ADMIN_EMAIL: admin@bhd-om.com
      E2E_ADMIN_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database for E2E logins
        run: npx prisma db seed

      - name: Build application
        run: npm run build

      - name: Run critical flow tests
        run: npm run test:e2e:critical
        env:
          CI: true
          E2E_SECURITY_PIN: ${{ secrets.E2E_SECURITY_PIN }}
          E2E_ACCOUNTANT_EMAIL: ${{ secrets.E2E_ACCOUNTANT_EMAIL }}
          E2E_ACCOUNTANT_PASSWORD: ${{ secrets.E2E_ACCOUNTANT_PASSWORD }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
